<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Gestión de Usuarios</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid py-5 bg-light min-vh-100">
        <!-- Encabezado -->
        <div class="row mb-5">
            <div class="col-12">
                <h1 class="text-center text-primary fw-bold mb-2">
                    <i class="bi bi-people-fill"></i> Panel de Gestión de Usuarios
                </h1>
                <p class="text-center text-muted">Administra eficientemente tu base de datos de usuarios</p>
            </div>
        </div>

        <!-- Panel de Estadísticas -->
        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="card bg-primary text-white shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">Total de Usuarios</h5>
                        <h2 id="totalUsuarios" class="fw-bold">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card bg-success text-white shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">Usuarios Activos</h5>
                        <h2 id="usuariosActivos" class="fw-bold">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card bg-danger text-white shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">Usuarios Inactivos</h5>
                        <h2 id="usuariosInactivos" class="fw-bold">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Formulario de Agregar Usuario -->
        <div class="row mb-4">
            <div class="col-md-8 mx-auto">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Agregar Nuevo Usuario</h5>
                    </div>
                    <div class="card-body">
                        <form id="formularioUsuario">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="nombre" placeholder="Ej: Juan Pérez" required>
                                    <small class="text-danger" id="errorNombre"></small>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="edad" class="form-label">Edad <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="edad" placeholder="Ej: 25" min="1" required>
                                    <small class="text-danger" id="errorEdad"></small>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="rol" class="form-label">Rol <span class="text-danger">*</span></label>
                                    <select class="form-select" id="rol" required>
                                        <option value="">Seleccionar rol...</option>
                                        <option value="Administrador">Administrador</option>
                                        <option value="Usuario">Usuario</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-plus-lg"></i> Agregar Usuario
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controles de Filtrado y Ordenamiento -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="btn-group w-100" role="group">
                    <button type="button" class="btn btn-outline-primary active" data-filtro="todos">
                        Todos
                    </button>
                    <button type="button" class="btn btn-outline-primary" data-filtro="administradores">
                        Administradores
                    </button>
                    <button type="button" class="btn btn-outline-primary" data-filtro="usuarios">
                        Usuarios
                    </button>
                </div>
            </div>
            <div class="col-md-6">
                <button id="btnOrdenarEdad" class="btn btn-info w-100">
                    <i class="bi bi-sort-up"></i> Ordenar por Edad (Ascendente)
                </button>
            </div>
        </div>

        <!-- Tabla de Usuarios -->
        <div class="row">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-table"></i> Lista de Usuarios</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="text-center" style="width: 5%">#</th>
                                        <th>Nombre</th>
                                        <th class="text-center">Edad</th>
                                        <th class="text-center">Rol</th>
                                        <th class="text-center">Estado</th>
                                        <th class="text-center" style="width: 15%">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaUsuarios">
                                    <!-- Los datos se generarán dinámicamente aquí -->
                                </tbody>
                            </table>
                        </div>
                        <!-- Mensaje cuando no hay usuarios -->
                        <div id="mensajeVacio" class="alert alert-info m-3 mb-0">
                            <i class="bi bi-info-circle"></i> No hay usuarios para mostrar. ¡Agrega uno para comenzar!
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Archivo JavaScript separado -->
    <script src="app.js"></script>
</body>
</html>
